<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meetings — TeamSync</title>
  <meta name="description" content="Manage upcoming and past meetings in TeamSync." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="stylesheet" href="../assets/css/teamsync.css" />
</head>
<body class="ts-shell">
  <aside id="ts-sidebar"></aside>
  <div class="ts-main">
    <header id="ts-topnav"></header>
    <main class="ts-content fade-in">

      <!-- Page Heading -->
      <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-10">
        <div>
          <h1 class="font-headline text-5xl text-on-surface tracking-tight mb-2">Meetings</h1>
          <p class="font-headline italic text-xl text-outline">Schedule, review, and track your team syncs.</p>
        </div>
        <button class="btn-primary gap-2 text-sm flex-shrink-0" onclick="openScheduleModal()">
          <span class="material-symbols-outlined text-lg">add</span>
          Schedule Meeting
        </button>
      </div>

      <!-- Filter Bar -->
      <div class="flex flex-col md:flex-row gap-4 mb-8 items-center justify-between">
        <div class="relative w-full md:w-96">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl">search</span>
          <input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant/20 rounded-xl text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-all" placeholder="Search meetings, clients or notes..." type="text" id="meeting-search" />
        </div>
        <div class="flex items-center gap-3 w-full md:w-auto">
          <div class="relative flex-1 md:flex-none">
            <select class="appearance-none w-full md:w-48 pl-4 pr-10 py-3 bg-surface-container-lowest border border-outline-variant/20 rounded-xl text-sm cursor-pointer focus:outline-none transition-all" id="status-filter">
              <option value="">Status: All</option>
              <option value="Scheduled">Scheduled</option>
              <option value="Completed">Completed</option>
              <option value="Draft">Draft</option>
            </select>
            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
          </div>
        </div>
      </div>

      <!-- Meetings Table -->
      <div class="ts-card overflow-hidden mb-12">
        <table class="ts-table" id="meetings-table">
          <thead>
            <tr>
              <th>Meeting Title</th>
              <th>Date & Time</th>
              <th>Organizer</th>
              <th>Status</th>
              <th>Participants</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="meetings-tbody">
            <!-- Rendered by JS -->
          </tbody>
        </table>
        <div class="px-6 py-4 border-t border-outline-variant/10 flex items-center justify-between">
          <p class="text-xs text-outline font-medium" id="meeting-count">Showing <span class="text-on-surface">0</span> meetings</p>
          <div class="flex gap-2">
            <button class="p-2 rounded-lg border border-outline-variant/15 text-outline hover:bg-surface-container-low transition-colors"><span class="material-symbols-outlined text-sm">chevron_left</span></button>
            <button class="p-2 rounded-lg border border-outline-variant/15 text-on-surface bg-surface-container-low hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined text-sm">chevron_right</span></button>
          </div>
        </div>
      </div>

      <!-- Summary Recap card (kept functional one only) -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
        <div class="p-6 bg-surface-container rounded-2xl flex flex-col justify-between h-40 group cursor-pointer hover:bg-surface-container-high transition-colors" onclick="window.location.href='mom-list.html'">
          <div class="flex justify-between items-start">
            <span class="material-symbols-outlined text-secondary bg-white p-2 rounded-xl">history</span>
            <span class="material-symbols-outlined text-zinc-300 group-hover:translate-x-1 transition-transform">arrow_forward</span>
          </div>
          <div>
            <h4 class="font-headline text-lg text-on-surface">Summary Recap</h4>
            <p class="text-xs text-outline">View notes and minutes from completed meetings.</p>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- MOM Slide-over Panel -->
  <div class="ts-slideover-overlay" id="mom-overlay" onclick="closeMomPanel()"></div>
  <div class="ts-slideover" id="mom-panel">
    <div class="ts-slideover-header">
      <h2 class="font-headline text-xl text-on-surface" id="mom-title">Minutes of Meeting</h2>
      <button class="ts-close-btn" onclick="closeMomPanel()"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="ts-slideover-body" id="mom-body">
      <!-- Filled by JS -->
    </div>
  </div>

  <!-- Schedule Meeting Modal -->
  <div class="ts-modal-overlay" id="schedule-overlay" onclick="if(event.target===this)closeScheduleModal()">
    <div class="ts-modal">
      <div class="ts-modal-header">
        <h2>Schedule Meeting</h2>
        <button class="ts-close-btn" onclick="closeScheduleModal()"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div class="ts-modal-body">
        <form id="schedule-form" class="space-y-5" onsubmit="handleSchedule(event)">
          <div>
            <label class="ts-label">Meeting Title *</label>
            <input class="ts-field" type="text" id="sm-title" placeholder="e.g. Sprint Review #13" required />
          </div>
          <div>
            <label class="ts-label">Project / Context</label>
            <input class="ts-field" type="text" id="sm-project" placeholder="e.g. Rebranding 2026" />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="ts-label">Date *</label>
              <input class="ts-field" type="date" id="sm-date" required />
            </div>
            <div>
              <label class="ts-label">Time *</label>
              <input class="ts-field" type="time" id="sm-time" required />
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="ts-label">Duration</label>
              <select class="ts-field" id="sm-duration">
                <option>30 min</option>
                <option selected>45 min</option>
                <option>60 min</option>
                <option>90 min</option>
              </select>
            </div>
            <div>
              <label class="ts-label">Location</label>
              <input class="ts-field" type="text" id="sm-location" placeholder="e.g. Virtual Atelier" value="Virtual Atelier" />
            </div>
          </div>
          <div>
            <label class="ts-label">Agenda / Notes</label>
            <textarea class="ts-field resize-none h-20" id="sm-notes" placeholder="Brief agenda or meeting notes…"></textarea>
          </div>
        </form>
      </div>
      <div class="ts-modal-footer">
        <button class="btn-secondary text-sm" onclick="closeScheduleModal()">Cancel</button>
        <button class="btn-primary text-sm" onclick="document.getElementById('schedule-form').requestSubmit()">
          <span class="material-symbols-outlined text-sm">event</span>Schedule
        </button>
      </div>
    </div>
  </div>

  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/components.js"></script>
  <script>
    const user = requireAuth(['admin','leader','member']);
    if (user) {
      renderSidebar(user, 'meetings');
      renderTopNav('Meetings', user);
    }

    // ── Demo Data ──────────────────────────────────────────────
    const MEETINGS = [
      {
        id: 1, title: 'Quarterly Brand Alignment', project: 'Rebranding 2026',
        date: 'Apr 24, 2026 · 10:00 AM', organizer: { name: 'Sarah Miller', initials: 'SM', color: 'bg-primary' },
        status: 'Scheduled',
        participants: [
          { initials: 'DC', color: 'bg-secondary' },
          { initials: 'JD', color: 'bg-tertiary' },
          { extra: 4 }
        ],
        mom: {
          title: 'Quarterly Brand Alignment — MOM',
          date: 'Apr 24, 2026',
          decisions: ['Finalize brand palette by end of sprint', 'Logo refresh to be presented next review'],
          actionItems: [
            { task: 'Prepare logo concepts', assignee: 'David Chen', due: 'Apr 28' },
            { task: 'Compile brand audit report', assignee: 'Sarah Miller', due: 'Apr 30' }
          ],
          notes: 'The team agreed to prioritize the brand refresh ahead of the product redesign. Key stakeholders will review the palette options during the next sync.'
        }
      },
      {
        id: 2, title: 'Mobile App UX Review', project: 'TeamSync Mobile',
        date: 'Apr 22, 2026 · 02:30 PM', organizer: { name: 'David Chen', initials: 'DC', color: 'bg-secondary' },
        status: 'Completed',
        participants: [
          { initials: 'JD', color: 'bg-primary' },
          { initials: 'MV', color: 'bg-outline' },
        ],
        mom: {
          title: 'Mobile App UX Review — MOM',
          date: 'Apr 22, 2026',
          decisions: ['Adopt bottom nav pattern for mobile', 'Dark mode to ship in v2'],
          actionItems: [
            { task: 'Finalize mobile wireframes', assignee: 'David Chen', due: 'Apr 26' },
            { task: 'Accessibility audit on nav', assignee: 'Jane Doe', due: 'Apr 28' }
          ],
          notes: 'Discussed mobile navigation patterns. Consensus reached on bottom tab bar. Dark mode deferred to v2 release.'
        }
      },
      {
        id: 3, title: 'Client Onboarding: Atelier Inc.', project: 'Sales Pipeline',
        date: 'Apr 25, 2026 · 09:00 AM', organizer: { name: 'Jane Doe', initials: 'JD', color: 'bg-surface-container-high text-on-surface' },
        status: 'Draft',
        participants: [
          { initials: 'SK', color: 'bg-tertiary' },
        ],
        mom: {
          title: 'Client Onboarding: Atelier Inc. — MOM',
          date: 'Apr 25, 2026',
          decisions: ['Draft status — meeting not yet conducted'],
          actionItems: [],
          notes: 'This meeting is in draft status. No minutes available yet.'
        }
      },
      {
        id: 4, title: 'Architecture Sprint Planning', project: 'Engineering',
        date: 'Apr 26, 2026 · 11:30 AM', organizer: { name: 'Marcus V.', initials: 'MV', color: 'bg-tertiary' },
        status: 'Scheduled',
        participants: [
          { initials: 'EV', color: 'bg-primary' },
          { initials: 'JD', color: 'bg-secondary' },
          { extra: 8 }
        ],
        mom: {
          title: 'Architecture Sprint Planning — MOM',
          date: 'Apr 26, 2026',
          decisions: ['Prioritize auth refactor before new features', 'Cloud migration timeline set to Q3'],
          actionItems: [
            { task: 'Auth middleware refactor', assignee: 'Jane Doe', due: 'May 2' },
            { task: 'Cloud cost analysis', assignee: 'Marcus V.', due: 'May 5' }
          ],
          notes: 'Sprint planning session focused on technical debt. Auth refactor is the top priority blocking mobile team. Cloud migration pushed to Q3 pending cost analysis.'
        }
      },
    ];

    // ── Rendering ──────────────────────────────────────────────
    function renderMeetings() {
      const tbody = document.getElementById('meetings-tbody');
      tbody.innerHTML = '';
      MEETINGS.forEach((m, idx) => {
        const statusBadge = m.status === 'Scheduled'
          ? `<span class="badge-scheduled"><span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>Scheduled</span>`
          : m.status === 'Completed'
            ? `<span class="badge-completed">Completed</span>`
            : `<span class="badge-draft">Draft</span>`;

        const participants = m.participants.map(p => {
          if (p.extra) return `<div class="w-7 h-7 rounded-full bg-surface-container-high flex items-center justify-center text-[9px] font-bold ring-2 ring-white">+${p.extra}</div>`;
          return `<div class="w-7 h-7 rounded-full ${p.color} text-white text-[9px] font-bold flex items-center justify-center ring-2 ring-white">${p.initials}</div>`;
        }).join('');

        tbody.innerHTML += `
          <tr class="cursor-pointer group" data-idx="${idx}" data-title="${m.title.toLowerCase()}" data-status="${m.status}">
            <td onclick="openMomPanel(${idx})">
              <p class="font-headline text-lg text-on-surface group-hover:text-primary transition-colors">${m.title}</p>
              <p class="text-xs text-outline">Project: ${m.project}</p>
            </td>
            <td class="font-mono text-xs text-on-surface-variant" onclick="openMomPanel(${idx})">${m.date}</td>
            <td onclick="openMomPanel(${idx})">
              <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full ${m.organizer.color} text-white text-[9px] font-bold flex items-center justify-center">${m.organizer.initials}</div>
                <span class="text-sm font-medium">${m.organizer.name}</span>
              </div>
            </td>
            <td onclick="openMomPanel(${idx})">${statusBadge}</td>
            <td onclick="openMomPanel(${idx})">
              <div class="flex -space-x-1.5">${participants}</div>
            </td>
            <td class="text-right relative">
              <span class="material-symbols-outlined text-outline hover:text-on-surface transition-colors cursor-pointer meeting-menu-btn" onclick="event.stopPropagation();toggleMeetingMenu(${idx})">more_vert</span>
              <div class="ts-dropdown" id="meeting-dd-${idx}">
                <button class="ts-dropdown-item" onclick="event.stopPropagation();window.location.href='meeting-detail.html'">
                  <span class="material-symbols-outlined text-sm">visibility</span>View Details
                </button>
                <button class="ts-dropdown-item" onclick="event.stopPropagation();window.location.href='mom-detail.html'">
                  <span class="material-symbols-outlined text-sm">description</span>View MOM
                </button>
                <div class="ts-dropdown-sep"></div>
                <button class="ts-dropdown-item" onclick="event.stopPropagation();closeAllMeetingMenus()">
                  <span class="material-symbols-outlined text-sm">edit</span>Edit Meeting
                </button>
                <button class="ts-dropdown-item danger" onclick="event.stopPropagation();cancelMeeting(${idx})">
                  <span class="material-symbols-outlined text-sm">cancel</span>Cancel Meeting
                </button>
              </div>
            </td>
          </tr>`;
      });
      document.getElementById('meeting-count').innerHTML = `Showing <span class="text-on-surface">${MEETINGS.length}</span> meetings`;
    }

    function cancelMeeting(idx) {
      if (confirm('Cancel "' + MEETINGS[idx].title + '"? This cannot be undone.')) {
        MEETINGS.splice(idx, 1);
        renderMeetings();
      }
      closeAllMeetingMenus();
    }

    // ── MOM Slide-over ───────────────────────────────────────
    function openMomPanel(idx) {
      const m = MEETINGS[idx];
      const mom = m.mom;
      document.getElementById('mom-title').textContent = mom.title;

      const actionItemsHtml = mom.actionItems.length > 0
        ? mom.actionItems.map(a => `
            <div class="flex items-start gap-3 p-3 bg-surface-container-lowest rounded-lg">
              <span class="material-symbols-outlined text-primary text-sm mt-0.5">task_alt</span>
              <div class="flex-1">
                <p class="text-sm font-medium text-on-surface">${a.task}</p>
                <p class="text-[10px] text-outline font-mono mt-0.5">${a.assignee} · Due ${a.due}</p>
              </div>
            </div>`).join('')
        : '<p class="text-sm text-outline italic">No action items yet.</p>';

      const decisionsHtml = mom.decisions.map(d =>
        `<li class="flex items-start gap-2"><span class="material-symbols-outlined text-secondary text-sm mt-0.5" style="font-variation-settings:'FILL' 1;">check_circle</span><span class="text-sm text-on-surface">${d}</span></li>`
      ).join('');

      document.getElementById('mom-body').innerHTML = `
        <div class="mb-6">
          <p class="text-[10px] uppercase tracking-widest text-outline font-bold mb-1">Meeting Date</p>
          <p class="text-sm font-mono text-on-surface-variant">${mom.date}</p>
        </div>

        <div class="mb-6">
          <p class="text-[10px] uppercase tracking-widest text-outline font-bold mb-3">Key Decisions</p>
          <ul class="space-y-2">${decisionsHtml}</ul>
        </div>

        <div class="mb-6">
          <p class="text-[10px] uppercase tracking-widest text-outline font-bold mb-3">Action Items</p>
          <div class="space-y-2">${actionItemsHtml}</div>
        </div>

        <div class="mb-8">
          <p class="text-[10px] uppercase tracking-widest text-outline font-bold mb-2">Notes</p>
          <p class="text-sm text-on-surface-variant leading-relaxed">${mom.notes}</p>
        </div>

        <a href="mom-detail.html" class="btn-primary gap-2 text-sm w-full justify-center">
          <span class="material-symbols-outlined text-sm">open_in_new</span>
          View Full MOM
        </a>
      `;

      document.getElementById('mom-overlay').classList.add('open');
      document.getElementById('mom-panel').classList.add('open');
    }

    function closeMomPanel() {
      document.getElementById('mom-overlay').classList.remove('open');
      document.getElementById('mom-panel').classList.remove('open');
    }

    // ── Meeting Menu Dropdown ───────────────────────────────
    function toggleMeetingMenu(idx) {
      closeAllMeetingMenus();
      document.getElementById('meeting-dd-' + idx).classList.add('open');
    }
    function closeAllMeetingMenus() {
      document.querySelectorAll('.ts-dropdown').forEach(d => d.classList.remove('open'));
    }
    document.addEventListener('click', e => {
      if (!e.target.closest('.meeting-menu-btn') && !e.target.closest('.ts-dropdown')) {
        closeAllMeetingMenus();
      }
    });

    // ── Schedule Modal ──────────────────────────────────────
    function openScheduleModal() {
      document.getElementById('schedule-overlay').classList.add('open');
    }
    function closeScheduleModal() {
      document.getElementById('schedule-overlay').classList.remove('open');
      document.getElementById('schedule-form').reset();
    }
    function handleSchedule(e) {
      e.preventDefault();
      const title = document.getElementById('sm-title').value.trim();
      const project = document.getElementById('sm-project').value.trim() || 'General';
      const rawDate = document.getElementById('sm-date').value;
      const rawTime = document.getElementById('sm-time').value;
      const dateStr = new Date(rawDate + 'T' + rawTime).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const timeStr = new Date(rawDate + 'T' + rawTime).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

      MEETINGS.unshift({
        id: Date.now(),
        title,
        project,
        date: `${dateStr} · ${timeStr}`,
        organizer: { name: user.name, initials: user.name.split(' ').map(n=>n[0]).join(''), color: 'bg-primary' },
        status: 'Scheduled',
        participants: [],
        mom: {
          title: title + ' — MOM',
          date: dateStr,
          decisions: ['Meeting scheduled — no minutes yet'],
          actionItems: [],
          notes: 'This meeting has been scheduled. Minutes will be available after the meeting concludes.'
        }
      });
      renderMeetings();
      closeScheduleModal();
    }

    // ── Search + Filter ─────────────────────────────────────
    function applyFilters() {
      const q = document.getElementById('meeting-search').value.toLowerCase();
      const statusVal = document.getElementById('status-filter').value;
      let visible = 0;
      document.querySelectorAll('#meetings-tbody tr').forEach(row => {
        const matchTitle = !q || row.dataset.title.includes(q);
        const matchStatus = !statusVal || row.dataset.status === statusVal;
        const show = matchTitle && matchStatus;
        row.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      document.getElementById('meeting-count').innerHTML = `Showing <span class="text-on-surface">${visible}</span> of ${MEETINGS.length} meetings`;
    }
    document.getElementById('meeting-search').addEventListener('input', applyFilters);
    document.getElementById('status-filter').addEventListener('change', applyFilters);

    // ── Init ──────────────────────────────────────────────────
    renderMeetings();
  </script>
</body>
</html>
