<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks — TeamSync</title>
  <meta name="description" content="Manage and track team-specific tasks in TeamSync." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="stylesheet" href="../assets/css/teamsync.css" />
  <style>
    .task-row { transition: all 0.15s; }
    .task-row:hover .task-actions { opacity: 1; }
    .task-actions { opacity: 0; transition: opacity 0.2s; }
    .filter-chip.active { background: #0037b0; color: #fff; }
  </style>
</head>
<body class="ts-shell">
  <aside id="ts-sidebar"></aside>
  <div class="ts-main">
    <header id="ts-topnav"></header>
    <main class="ts-content fade-in">

      <!-- Header -->
      <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10">
        <div>
          <h1 class="font-headline text-5xl text-on-surface tracking-tight mb-2">Tasks</h1>
          <p class="font-headline italic text-xl text-outline">Track, assign, and deliver with precision — by team.</p>
        </div>
        <button class="btn-primary gap-2 text-sm" onclick="openNewTaskModal()">
          <span class="material-symbols-outlined">add</span>
          New Task
        </button>
      </div>

      <!-- Filter Chips -->
      <div class="flex flex-wrap items-center gap-3 mb-8">
        <span class="text-[10px] uppercase tracking-widest text-outline font-semibold mr-2">Filter:</span>
        <button class="filter-chip active px-4 py-2 rounded-full border border-outline-variant/20 text-sm font-medium transition-all" data-filter="all">All</button>
        <button class="filter-chip px-4 py-2 rounded-full border border-outline-variant/20 text-sm font-medium hover:bg-surface-container transition-all" data-filter="in-progress">In Progress</button>
        <button class="filter-chip px-4 py-2 rounded-full border border-outline-variant/20 text-sm font-medium hover:bg-surface-container transition-all" data-filter="todo">To Do</button>
        <button class="filter-chip px-4 py-2 rounded-full border border-outline-variant/20 text-sm font-medium hover:bg-surface-container transition-all" data-filter="completed">Completed</button>
        <div class="ml-auto flex items-center gap-3">
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-lg">search</span>
            <input class="pl-10 pr-4 py-2 bg-surface-container-lowest border border-outline-variant/20 rounded-xl text-sm focus:outline-none focus:border-primary transition-all" placeholder="Search tasks..." id="task-search" />
          </div>
          <div class="relative">
            <select class="appearance-none pl-4 pr-10 py-2 bg-surface-container-lowest border border-outline-variant/20 rounded-xl text-sm cursor-pointer focus:outline-none" id="team-filter">
              <option value="">All Teams</option>
              <option value="Atelier Alpha">Atelier Alpha</option>
              <option value="Studio Beta">Studio Beta</option>
              <option value="Craft Gamma">Craft Gamma</option>
              <option value="Nexus Delta">Nexus Delta</option>
              <option value="Studio Epsilon">Studio Epsilon</option>
            </select>
            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none text-sm">expand_more</span>
          </div>
          <div class="relative">
            <select class="appearance-none pl-4 pr-10 py-2 bg-surface-container-lowest border border-outline-variant/20 rounded-xl text-sm cursor-pointer focus:outline-none" id="assignee-filter">
              <option value="">All Assignees</option>
              <option>Jane Doe</option>
              <option>David Chen</option>
              <option>Elena Vance</option>
              <option>Marcus V.</option>
            </select>
            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none text-sm">expand_more</span>
          </div>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="task-stats">
        <!-- Rendered by JS -->
      </div>

      <!-- Tasks Table -->
      <div class="ts-card overflow-hidden" id="tasks-container">
        <table class="ts-table" id="tasks-table">
          <thead>
            <tr>
              <th>Task Name</th>
              <th>Team</th>
              <th>Assignee</th>
              <th>Priority</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tasks-tbody">
            <!-- Rendered by JS -->
          </tbody>
        </table>
        <div class="px-6 py-4 border-t border-outline-variant/10 flex items-center justify-between">
          <p class="text-xs text-outline" id="task-count">Showing 0 tasks</p>
          <div class="flex gap-2">
            <button class="p-2 rounded-lg border border-outline-variant/15 text-outline hover:bg-surface-container-low transition-colors"><span class="material-symbols-outlined text-sm">chevron_left</span></button>
            <button class="p-2 rounded-lg border border-outline-variant/15 text-on-surface bg-surface-container-low hover:bg-surface-container-high transition-colors"><span class="material-symbols-outlined text-sm">chevron_right</span></button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- New Task Modal -->
  <div class="ts-modal-overlay" id="newtask-overlay" onclick="if(event.target===this)closeNewTaskModal()">
    <div class="ts-modal">
      <div class="ts-modal-header">
        <h2>New Task</h2>
        <button class="ts-close-btn" onclick="closeNewTaskModal()"><span class="material-symbols-outlined">close</span></button>
      </div>
      <div class="ts-modal-body">
        <form id="newtask-form" class="space-y-5" onsubmit="handleNewTask(event)">
          <div>
            <label class="ts-label">Task Name *</label>
            <input class="ts-field" type="text" id="nt-name" placeholder="e.g. Refactor Auth Middleware" required />
          </div>
          <div>
            <label class="ts-label">Category</label>
            <input class="ts-field" type="text" id="nt-category" placeholder="e.g. Engineering · API" />
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="ts-label">Team *</label>
              <select class="ts-field" id="nt-team" required>
                <option value="">Select team…</option>
                <option>Atelier Alpha</option>
                <option>Studio Beta</option>
                <option>Craft Gamma</option>
                <option>Nexus Delta</option>
                <option>Studio Epsilon</option>
              </select>
            </div>
            <div>
              <label class="ts-label">Assignee</label>
              <select class="ts-field" id="nt-assignee">
                <option value="">Unassigned</option>
                <option value="JD">Jane Doe</option>
                <option value="DC">David Chen</option>
                <option value="EV">Elena Vance</option>
                <option value="MV">Marcus V.</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="ts-label">Priority</label>
              <select class="ts-field" id="nt-priority">
                <option>Medium</option>
                <option>Critical</option>
                <option>High</option>
                <option>Low</option>
              </select>
            </div>
            <div>
              <label class="ts-label">Due Date</label>
              <input class="ts-field" type="date" id="nt-due" />
            </div>
          </div>
          <div>
            <label class="ts-label">Description</label>
            <textarea class="ts-field resize-none h-16" id="nt-desc" placeholder="Brief task description…"></textarea>
          </div>
        </form>
      </div>
      <div class="ts-modal-footer">
        <button class="btn-secondary text-sm" onclick="closeNewTaskModal()">Cancel</button>
        <button class="btn-primary text-sm" onclick="document.getElementById('newtask-form').requestSubmit()">
          <span class="material-symbols-outlined text-sm">add</span>Create Task
        </button>
      </div>
    </div>
  </div>

  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/components.js"></script>
  <script>
    const user = requireAuth(['admin','leader','member']);
    if (user) {
      renderSidebar(user, 'tasks');
      renderTopNav('Tasks', user);
    }

    // ── Demo Data ──────────────────────────────────────────────
    const ASSIGNEE_MAP = {
      JD: { name: 'Jane Doe', color: 'bg-primary' },
      DC: { name: 'David Chen', color: 'bg-secondary' },
      EV: { name: 'Elena Vance', color: 'bg-tertiary' },
      MV: { name: 'Marcus V.', color: 'bg-outline' },
    };

    const TASKS = [
      { name: 'Refactor Auth Middleware', category: 'Engineering · API', team: 'Studio Beta', assignee: 'JD', priority: 'Critical', status: 'in-progress', due: 'Apr 16, 2026' },
      { name: 'Update API Documentation', category: 'Engineering · Docs', team: 'Studio Beta', assignee: 'DC', priority: 'Medium', status: 'todo', due: '—' },
      { name: 'Cloud Security Audit', category: 'Engineering · Security', team: 'Studio Beta', assignee: 'MV', priority: 'High', status: 'completed', due: 'Apr 8, 2026' },
      { name: 'Optimize Asset Pipeline', category: 'DevOps · Performance', team: 'Studio Beta', assignee: 'JD', priority: 'Low', status: 'todo', due: '—' },
      { name: 'Design System V2 — Component Audit', category: 'Design · System', team: 'Atelier Alpha', assignee: 'EV', priority: 'High', status: 'in-progress', due: 'Apr 20, 2026' },
      { name: 'Brand Guidelines Update', category: 'Design · Brand', team: 'Atelier Alpha', assignee: 'DC', priority: 'Medium', status: 'todo', due: '—' },
      { name: 'User Interview Synthesis', category: 'Product · Research', team: 'Craft Gamma', assignee: 'MV', priority: 'Medium', status: 'in-progress', due: 'Apr 22, 2026' },
      { name: 'Pipeline Cleanup Sprint', category: 'Sales · Pipeline', team: 'Nexus Delta', assignee: 'JD', priority: 'High', status: 'in-progress', due: 'Apr 18, 2026' },
      { name: 'Q2 Campaign Launch', category: 'Marketing · Campaign', team: 'Studio Epsilon', assignee: 'EV', priority: 'High', status: 'in-progress', due: 'Apr 20, 2026' },
    ];

    const PRIORITY_CLASS = { Critical: 'badge-critical', High: 'badge-high', Medium: 'badge-medium', Low: 'badge-low' };

    // ── Rendering ─────────────────────────────────────────────
    function updateStats() {
      const total = TASKS.length;
      const inProgress = TASKS.filter(t => t.status === 'in-progress').length;
      const todo = TASKS.filter(t => t.status === 'todo').length;
      const completed = TASKS.filter(t => t.status === 'completed').length;
      document.getElementById('task-stats').innerHTML = `
        <div class="ts-card p-4 flex items-center gap-4">
          <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center flex-shrink-0"><span class="material-symbols-outlined text-primary text-sm">list</span></div>
          <div><p class="font-headline text-4xl font-bold text-on-surface">${total}</p><p class="text-xs text-outline">Total tasks</p></div>
        </div>
        <div class="ts-card p-4 flex items-center gap-4">
          <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center flex-shrink-0"><span class="material-symbols-outlined text-primary text-sm">pending_actions</span></div>
          <div><p class="font-headline text-4xl font-bold text-primary">${inProgress}</p><p class="text-xs text-outline">In progress</p></div>
        </div>
        <div class="ts-card p-4 flex items-center gap-4">
          <div class="w-8 h-8 rounded-lg bg-surface-container-high flex items-center justify-center flex-shrink-0"><span class="material-symbols-outlined text-on-surface-variant text-sm">radio_button_unchecked</span></div>
          <div><p class="font-headline text-4xl font-bold text-on-surface">${todo}</p><p class="text-xs text-outline">To do</p></div>
        </div>
        <div class="ts-card p-4 flex items-center gap-4">
          <div class="w-8 h-8 rounded-lg bg-secondary/10 flex items-center justify-center flex-shrink-0"><span class="material-symbols-outlined text-secondary text-sm">check_circle</span></div>
          <div><p class="font-headline text-4xl font-bold text-secondary">${completed}</p><p class="text-xs text-outline">Completed</p></div>
        </div>
      `;
    }

    function renderTasks() {
      const tbody = document.getElementById('tasks-tbody');
      tbody.innerHTML = '';
      TASKS.forEach((t, idx) => {
        const a = ASSIGNEE_MAP[t.assignee] || { name: 'Unassigned', color: 'bg-surface-container-high' };
        const isCompleted = t.status === 'completed';

        let statusIcon, statusHtml;
        if (t.status === 'in-progress') {
          statusIcon = `<span class="material-symbols-outlined text-primary text-lg" style="font-variation-settings:'FILL' 0.5;">check_circle</span>`;
          statusHtml = `<span class="flex items-center gap-1.5 text-xs font-medium"><span class="animate-ping inline-flex h-2 w-2 rounded-full bg-primary opacity-75"></span>In Progress</span>`;
        } else if (t.status === 'completed') {
          statusIcon = `<span class="material-symbols-outlined text-secondary text-lg" style="font-variation-settings:'FILL' 1;">check_circle</span>`;
          statusHtml = `<span class="flex items-center gap-1.5 text-xs font-medium text-secondary"><span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1;">check_circle</span>Completed</span>`;
        } else {
          statusIcon = `<span class="material-symbols-outlined text-outline-variant text-lg">radio_button_unchecked</span>`;
          statusHtml = `<span class="text-xs text-outline">To Do</span>`;
        }

        tbody.innerHTML += `
          <tr class="task-row" data-status="${t.status}" data-team="${t.team}" data-assignee="${a.name}" data-name="${t.name.toLowerCase()}">
            <td>
              <div class="flex items-center gap-3">
                ${statusIcon}
                <div>
                  <p class="font-medium text-on-surface ${isCompleted ? 'line-through opacity-60' : ''}">${t.name}</p>
                  <p class="text-xs text-outline">${t.category}</p>
                </div>
              </div>
            </td>
            <td><span class="badge-team">${t.team}</span></td>
            <td>
              <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-full ${a.color} text-white text-[9px] font-bold flex items-center justify-center">${t.assignee}</div>
                <span class="text-sm">${a.name}</span>
              </div>
            </td>
            <td><span class="text-[10px] font-bold px-2 py-0.5 rounded ${PRIORITY_CLASS[t.priority]}">${t.priority}</span></td>
            <td>${statusHtml}</td>
            <td class="task-actions">
              <div class="flex items-center gap-1">
                <button class="p-1.5 text-outline hover:text-primary rounded-lg transition-colors"><span class="material-symbols-outlined text-sm">edit</span></button>
                <button class="p-1.5 text-outline hover:text-error rounded-lg transition-colors" onclick="deleteTask(${idx})"><span class="material-symbols-outlined text-sm">delete</span></button>
              </div>
            </td>
          </tr>`;
      });
      document.getElementById('task-count').textContent = `Showing ${TASKS.length} tasks`;
      updateStats();
    }

    function deleteTask(idx) {
      if (confirm('Delete "' + TASKS[idx].name + '"?')) {
        TASKS.splice(idx, 1);
        renderTasks();
      }
    }

    // ── New Task Modal ───────────────────────────────────────────
    function openNewTaskModal() {
      document.getElementById('newtask-overlay').classList.add('open');
    }
    function closeNewTaskModal() {
      document.getElementById('newtask-overlay').classList.remove('open');
      document.getElementById('newtask-form').reset();
    }
    function handleNewTask(e) {
      e.preventDefault();
      const name = document.getElementById('nt-name').value.trim();
      const category = document.getElementById('nt-category').value.trim() || 'General';
      const team = document.getElementById('nt-team').value;
      const assignee = document.getElementById('nt-assignee').value || '??';
      const priority = document.getElementById('nt-priority').value;
      const rawDue = document.getElementById('nt-due').value;
      const due = rawDue ? new Date(rawDue).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
      TASKS.unshift({ name, category, team, assignee, priority, status: 'todo', due });
      renderTasks();
      closeNewTaskModal();
    }

    // ── Filter Chips ──────────────────────────────────────────
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        applyFilters();
      });
    });

    // ── Combined Filters ─────────────────────────────────────
    function applyFilters() {
      const statusFilter = document.querySelector('.filter-chip.active')?.dataset.filter || 'all';
      const teamFilter = document.getElementById('team-filter').value;
      const assigneeFilter = document.getElementById('assignee-filter').value;
      const searchQ = document.getElementById('task-search').value.toLowerCase();

      let visible = 0;
      document.querySelectorAll('.task-row').forEach(row => {
        const matchStatus = statusFilter === 'all' || row.dataset.status === statusFilter;
        const matchTeam = !teamFilter || row.dataset.team === teamFilter;
        const matchAssignee = !assigneeFilter || row.dataset.assignee === assigneeFilter;
        const matchSearch = !searchQ || row.dataset.name.includes(searchQ);
        const show = matchStatus && matchTeam && matchAssignee && matchSearch;
        row.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      document.getElementById('task-count').textContent = `Showing ${visible} of ${TASKS.length} tasks`;
    }

    document.getElementById('task-search').addEventListener('input', applyFilters);
    document.getElementById('team-filter').addEventListener('change', applyFilters);
    document.getElementById('assignee-filter').addEventListener('change', applyFilters);

    // ── Init ──────────────────────────────────────────────────
    renderTasks();
  </script>
</body>
</html>
