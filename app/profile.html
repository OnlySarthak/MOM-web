<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — TeamSync</title>
  <meta name="description" content="View your TeamSync profile and account information." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="stylesheet" href="../assets/css/teamsync.css" />
  <style>
    .field-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(196,197,215,0.3);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #1b1c1a;
      background: #ffffff;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field-input:focus {
      border-color: #0037b0;
      box-shadow: 0 0 0 3px rgba(0,55,176,0.1);
    }
    .field-input:disabled {
      background: #f4f3f0;
      color: #747686;
    }
  </style>
</head>
<body class="ts-shell">
  <aside id="ts-sidebar"></aside>
  <div class="ts-main">
    <header id="ts-topnav"></header>
    <main class="ts-content fade-in">

      <!-- Profile Hero -->
      <div class="flex flex-col md:flex-row items-start md:items-end gap-8 mb-12 pb-10 border-b border-outline-variant/10">
        <div class="relative group">
          <img id="profile-avatar" src="" alt="Avatar" class="w-28 h-28 rounded-2xl object-cover shadow-lg" onerror="this.src=''" />
          <div class="absolute inset-0 rounded-2xl bg-on-surface/30 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center cursor-pointer">
            <span class="material-symbols-outlined text-white text-xl">photo_camera</span>
          </div>
        </div>
        <div>
          <div class="flex items-center gap-3 mb-1">
            <h1 class="font-headline text-4xl text-on-surface" id="profile-name">Loading…</h1>
            <span class="px-2 py-0.5 bg-primary-fixed text-on-primary-fixed-variant text-[9px] font-bold uppercase tracking-widest rounded-full" id="profile-role-badge">Admin</span>
          </div>
          <p class="text-on-surface-variant" id="profile-title">—</p>
          <p class="font-mono text-sm text-outline mt-1" id="profile-email">—</p>
        </div>
        <div class="md:ml-auto">
          <button id="save-btn" class="btn-primary gap-2 text-sm"><span class="material-symbols-outlined text-sm">save</span>Save Changes</button>
        </div>
      </div>

      <div class="grid grid-cols-12 gap-8">
        <!-- Left: Change Name + Change Password -->
        <div class="col-span-12 lg:col-span-7 space-y-8">

          <!-- Change Your Name -->
          <section class="ts-card p-8">
            <div class="flex items-center gap-3 mb-6">
              <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center"><span class="material-symbols-outlined text-primary text-sm">badge</span></div>
              <h2 class="font-headline text-xl text-on-surface">Change Your Name</h2>
            </div>
            <div class="grid grid-cols-2 gap-5">
              <div>
                <label class="block text-[10px] uppercase tracking-widest text-outline font-bold mb-2">First Name</label>
                <input class="field-input" type="text" id="field-firstname" placeholder="First name" />
              </div>
              <div>
                <label class="block text-[10px] uppercase tracking-widest text-outline font-bold mb-2">Last Name</label>
                <input class="field-input" type="text" id="field-lastname" placeholder="Last name" />
              </div>
            </div>
          </section>

          <!-- Change Password -->
          <section class="ts-card p-8">
            <div class="flex items-center gap-3 mb-6">
              <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center"><span class="material-symbols-outlined text-primary text-sm">lock</span></div>
              <h2 class="font-headline text-xl text-on-surface">Change Password</h2>
            </div>
            <div class="grid grid-cols-1 gap-5">
              <div>
                <label class="block text-[10px] uppercase tracking-widest text-outline font-bold mb-2">Old Password</label>
                <input class="field-input" type="password" id="field-old-password" placeholder="Enter your current password" />
              </div>
              <div>
                <label class="block text-[10px] uppercase tracking-widest text-outline font-bold mb-2">New Password</label>
                <input class="field-input" type="password" id="field-new-password" placeholder="Enter new password" />
              </div>
              <div>
                <label class="block text-[10px] uppercase tracking-widest text-outline font-bold mb-2">Re-enter New Password</label>
                <input class="field-input" type="password" id="field-confirm-password" placeholder="Confirm new password" />
              </div>
              <div>
                <button id="change-password-btn" class="btn-primary text-sm gap-2">
                  <span class="material-symbols-outlined text-sm">lock_reset</span>Update Password
                </button>
              </div>
            </div>
          </section>
        </div>

        <!-- Right: Role + Logout -->
        <div class="col-span-12 lg:col-span-5 space-y-8">

          <!-- Role Badge -->
          <section class="ts-card p-8">
            <div class="flex items-center gap-3 mb-6">
              <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center"><span class="material-symbols-outlined text-primary text-sm">badge</span></div>
              <h2 class="font-headline text-xl text-on-surface">Workspace Role</h2>
            </div>
            <div class="flex items-center gap-4 p-4 bg-surface-container-low rounded-xl" id="role-detail">
              <div class="w-12 h-12 rounded-xl bg-inverse-surface flex items-center justify-center"><span class="material-symbols-outlined text-white">shield</span></div>
              <div>
                <p class="text-sm font-bold text-on-surface" id="role-label">Administrator</p>
                <p class="text-xs text-on-surface-variant">Full system access</p>
              </div>
            </div>
          </section>

          <!-- Account Actions -->
          <section class="ts-card p-8">
            <div class="flex items-center gap-3 mb-6">
              <div class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center"><span class="material-symbols-outlined text-primary text-sm">manage_accounts</span></div>
              <h2 class="font-headline text-xl text-on-surface">Account</h2>
            </div>
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 border border-outline-variant/30 rounded-xl hover:bg-surface-container-low text-sm font-medium text-on-surface-variant transition-colors">
              <span class="material-symbols-outlined text-sm">logout</span>
              Sign Out of Workspace
            </button>
          </section>
        </div>
      </div>

    </main>
  </div>

  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/components.js"></script>
  <script>
    const user = requireAuth(['admin','leader','member']);
    if (user) {
      renderSidebar(user, 'profile');
      renderTopNav('My Profile', user);

      // Populate user data
      document.getElementById('profile-avatar').src = user.avatar ||
        `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=1d4ed8&color=fff&size=128`;
      document.getElementById('profile-avatar').onerror = () => {
        document.getElementById('profile-avatar').src =
          `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=1d4ed8&color=fff&size=128`;
      };
      document.getElementById('profile-name').textContent = user.name;
      document.getElementById('profile-title').textContent = user.title;
      document.getElementById('profile-email').textContent = user.email;

      const [fn, ...ln] = user.name.split(' ');
      document.getElementById('field-firstname').value = fn;
      document.getElementById('field-lastname').value = ln.join(' ');

      // Role badge
      const roleBadge = document.getElementById('profile-role-badge');
      const roleLabel = document.getElementById('role-label');
      if (user.role === 'admin') {
        roleBadge.textContent = 'Admin';
        roleLabel.textContent = 'Administrator';
      } else if (user.role === 'leader') {
        roleBadge.textContent = 'Team Leader';
        roleLabel.textContent = 'Team Leader';
        document.getElementById('role-detail').querySelector('.w-12').classList.replace('bg-inverse-surface','bg-primary');
        document.getElementById('role-detail').querySelector('.material-symbols-outlined').textContent = 'groups';
      } else {
        roleBadge.textContent = 'Member';
        roleLabel.textContent = 'Team Member';
        document.getElementById('role-detail').querySelector('.w-12').classList.replace('bg-inverse-surface','bg-secondary');
        document.getElementById('role-detail').querySelector('.material-symbols-outlined').textContent = 'person';
      }

      // Save name feedback
      document.getElementById('save-btn').addEventListener('click', function() {
        const original = this.innerHTML;
        this.innerHTML = '<span class="material-symbols-outlined text-sm">check</span> Saved!';
        this.disabled = true;
        setTimeout(() => { this.innerHTML = original; this.disabled = false; }, 2000);
      });

      // Change password feedback
      document.getElementById('change-password-btn').addEventListener('click', function() {
        const oldPwd = document.getElementById('field-old-password').value;
        const newPwd = document.getElementById('field-new-password').value;
        const confirmPwd = document.getElementById('field-confirm-password').value;
        if (!oldPwd || !newPwd || !confirmPwd) { alert('Please fill in all password fields.'); return; }
        if (newPwd !== confirmPwd) { alert('New passwords do not match.'); return; }
        const original = this.innerHTML;
        this.innerHTML = '<span class="material-symbols-outlined text-sm">check</span> Password Updated!';
        this.disabled = true;
        document.getElementById('field-old-password').value = '';
        document.getElementById('field-new-password').value = '';
        document.getElementById('field-confirm-password').value = '';
        setTimeout(() => { this.innerHTML = original; this.disabled = false; }, 2500);
      });
    }
  </script>
</body>
</html>
